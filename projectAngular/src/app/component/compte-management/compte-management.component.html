<p-card header="Compte Management" class="mb-3">

    <p-toolbar>
        <div class="p-toolbar-group-left">
            <button pButton label="Add Compte" icon="pi pi-plus" (click)="openNew()"></button>
        </div>

        <div class="p-toolbar-group-right search-container">
            <span class="p-input-icon-left">
                <i class="pi pi-search"></i>
                <input pInputText placeholder="Search by name, RIB, CIN..." [(ngModel)]="searchQuery"
                    (ngModelChange)="applyFilters()">
            </span>

            <p-dropdown [options]="[
                    { label: 'Name', value: 'name' },
                    { label: 'CIN', value: 'cin' },
                    { label: 'City', value: 'city' }
                ]" [(ngModel)]="sortField" (onChange)="applyFilters()" placeholder="Sort by">
            </p-dropdown>

            <button pButton icon="pi pi-sort-alpha-down" (click)="sortOrder=1; applyFilters()"></button>
            <button pButton icon="pi pi-sort-alpha-up" (click)="sortOrder=-1; applyFilters()"></button>
        </div>
    </p-toolbar>

    <p-table [value]="filteredComptes" dataKey="id">

        <ng-template pTemplate="header">
            <tr>
                <th>Name</th>
                <th>RIB</th>
                <th>CIN</th>
                <th>City</th>
                <th>Location</th>
                <th>Postal</th>
                <th>Actions</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-c>
            <tr>
                <td>{{ c.name }}</td>
                <td>{{ c.rib }}</td>
                <td>{{ c.cin }}</td>
                <td>{{ c.city }}</td>
                <td>{{ c.location }}</td>
                <td>{{ c.codePostal }}</td>

                <td>
                    <button pButton icon="pi pi-pencil" class="p-button-text" (click)="editCompte(c)" pTooltip="Edit"
                        tooltipPosition="bottom"></button>

                    <button pButton icon="pi pi-trash" class="p-button-text p-button-danger"
                        (click)="confirmDeleteCompte(c)" pTooltip="Delete" tooltipPosition="bottom"></button>
                </td>
            </tr>
        </ng-template>

    </p-table>
</p-card>

<!-- DIALOG -->
<p-dialog header="{{ dialogTitle }}" [(visible)]="dialogVisible" [modal]="true" [closable]="true">
    <form #compteForm="ngForm">
        <div class="p-fluid">

            <!-- RIB -->
            <div class="p-field">
                <label for="rib">RIB</label>

                <div class="p-inputgroup">
                    <span class="p-inputgroup-addon">{{ codeSubsidiary }}</span>
                    <input id="codeSuffix" pInputText name="codeSuffix" [(ngModel)]="codeSuffix"
                        (ngModelChange)="onRibChange()" [readonly]="isEdit" required>
                </div>

                <small *ngIf="!isEdit && ribValidationError" class="p-error">
                    <i class="pi pi-exclamation-triangle"></i> {{ ribValidationError }}
                </small>
            </div>

            <!-- Name -->
            <div class="p-field">
                <label>Name</label>
                <input pInputText name="name" [(ngModel)]="compte.name" required>
            </div>

            <!-- CIN -->
            <div class="p-field">
                <label>CIN</label>
                <input pInputText name="cin" [(ngModel)]="compte.cin" required>
            </div>

            <!-- CITY -->
            <div class="p-field">
                <label>City</label>
                <input pInputText name="city" [(ngModel)]="compte.city" required>
            </div>

            <!-- LOCATION -->
            <div class="p-field">
                <label>Location</label>
                <input pInputText name="location" [(ngModel)]="compte.location" required>
            </div>

            <!-- Postal -->
            <div class="p-field">
                <label>Postal Code</label>
                <input pInputText name="codePostal" [(ngModel)]="compte.codePostal" required>
            </div>
        </div>
    </form>

    <p-footer>
        <button pButton label="Cancel" class="p-button-secondary" (click)="dialogVisible = false"></button>
        <button pButton label="Save" (click)="saveCompte()"
            [disabled]="compteForm.invalid || ribValidationError"></button>
    </p-footer>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
